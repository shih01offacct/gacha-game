<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>活動專用扭蛋機</title>
    <style>
        body {
            margin: 0;
            background-color: #f4f4f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* === 調整為完美適應手機的彈性設計 === */
        .main-card {
            position: relative;
            width: 95%; /* 讓它在手機上自動縮放，左右保留一點點空隙 */
            max-width: 380px; /* 在電腦上最大就維持這個寬度，不會變形 */
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 30px; 
            overflow: hidden; 
        }

        .machine-area {
            position: relative;
            width: 100%;
            height: 380px; 
            background-image: url('gacha-bg.png'); 
            background-size: 110% auto; 
            background-position: center top; 
            background-repeat: no-repeat;
            z-index: 10;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-2px, -1px) rotate(-1deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            60% { transform: translate(-2px, 2px) rotate(-1deg); }
            80% { transform: translate(2px, -2px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shaking { animation: shake 0.3s infinite; }

        .start-btn { margin-top: 15px; background: #ffb300; color: #333; border: none; padding: 15px 70px; font-size: 32px; font-weight: 900; border-radius: 50px; cursor: pointer; box-shadow: 0 8px 0 #e6a100; transition: all 0.1s; z-index: 5; letter-spacing: 2px; }
        .start-btn:active { transform: translateY(8px); box-shadow: none; }
        .start-btn:disabled { background: #ccc; box-shadow: 0 8px 0 #999; cursor: not-allowed; }

        .gacha-ball { position: absolute; width: 80px; height: 80px; bottom: 0px; left: 50%; transform: translateX(-50%) scale(0); opacity: 0; transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 20; }
        .gacha-ball.roll-out { transform: translateX(-50%) scale(1.5) translateY(35px); opacity: 1; }
        .ball-top { width: 100%; height: 50%; background: rgba(255, 255, 255, 0.85); border-radius: 40px 40px 0 0; box-shadow: inset -5px -5px 15px rgba(0,0,0,0.1), inset 5px 5px 10px rgba(255,255,255,0.8); border: 1px solid rgba(200,200,200,0.5); border-bottom: none; box-sizing: border-box; transition: transform 0.4s ease-in-out; transform-origin: bottom center; }
        .ball-bottom { width: 100%; height: 50%; background: #ff5252; border-radius: 0 0 40px 40px; box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3); border: 1px solid rgba(0,0,0,0.1); border-top: 2px solid rgba(0,0,0,0.1); box-sizing: border-box; }
        .gacha-ball.open .ball-top { transform: translateY(-20px) rotate(20deg) translateX(10px); opacity: 0.8; }

        .result-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; z-index: 100; }
        .result-overlay.active { opacity: 1; pointer-events: auto; }
        /* 獎品卡片也做了稍微彈性的設定 */
        .prize-card { background: linear-gradient(135deg, #fff, #f9f9f9); padding: 30px; border-radius: 15px; text-align: center; transform: scale(0.5) translateY(50px); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); width: 80%; max-width: 320px; box-sizing: border-box; }
        .result-overlay.active .prize-card { transform: scale(1) translateY(-20px); }
        
        .rarity-tag { display: none; padding: 5px 15px; background: #333; color: gold; border-radius: 20px; font-weight: bold; margin-bottom: 15px; font-size: 14px;}
        .prize-title { font-size: 28px; color: #d84315; margin: 0 0 20px 0; font-weight: 900; }
        .close-btn { background: #333; color: #fff; border: none; padding: 10px 30px; border-radius: 20px; font-size: 16px; cursor: pointer; margin-top: 10px; }

        .admin-icon { position: absolute; top: 15px; right: 15px; font-size: 22px; color: #999; cursor: pointer; opacity: 0.5; transition: opacity 0.2s; z-index: 50; }
        .admin-icon:hover { opacity: 1; }
        /* 後台面板也確保不會超出手機螢幕 */
        .admin-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 200; width: 85%; max-width: 350px; box-sizing: border-box; }
        .admin-modal h3 { margin-top: 0; color: #333; border-bottom: 1px solid #eee; padding-bottom: 10px;}
        .admin-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; }
        .admin-item input { width: 50px; padding: 5px; text-align: center; border: 1px solid #ccc; border-radius: 5px;}
        
        .admin-btns { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .right-btns { display: flex; gap: 10px; }
        .admin-btns button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold;}
        .btn-save { background: #4caf50; color: white; }
        .btn-cancel { background: #ccc; color: #333;}
        .btn-reset { background: #ff5252; color: white; } 

        #adminOverlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 150; }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="admin-icon" onclick="checkPassword()" title="後台管理">⚙️</div>

        <div class="machine-area" id="machine">
            <div class="gacha-ball" id="capsule">
                <div class="ball-top"></div>
                <div class="ball-bottom" id="capsuleColor"></div>
            </div>
        </div>
        <button class="start-btn" id="startBtn" onclick="startGame()">開始抽獎</button>
    </div>

    <div class="result-overlay" id="resultScreen">
        <div class="prize-card">
            <div class="rarity-tag" id="rarityDisplay">Ultra Rare</div>
            <h1 class="prize-title" id="prizeNameDisplay">✨ 金蛋 ✨</h1>
            <p style="color:#666; margin-bottom: 20px; font-size: 14px;">恭喜抽中精美宣導品！<br>請向工作人員兌換。</p>
            <button class="close-btn" onclick="closeResult()">確認</button>
        </div>
    </div>

    <div id="adminOverlay"></div>
    <div class="admin-modal" id="adminPanel">
        <h3>庫存管理 (密碼: 8888)</h3>
        <div id="adminList"></div>
        <div class="admin-btns">
            <button class="btn-reset" onclick="resetData()">↺ 重置資料</button>
            <div class="right-btns">
                <button class="btn-cancel" onclick="closeAdmin()">取消</button>
                <button class="btn-save" onclick="saveAdminChanges()">儲存</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "8888"; 
        const STORAGE_KEY = "gachaInventoryEqual"; 

        const defaultPrizes = [
            { id: "p1", name: "🎁 不鏽鋼隔熱碗", rarity: "Ultra Rare", initialQty: 10, color: "#ffd700" },
            { id: "p2", name: "🎁 保溫瓶", rarity: "Super Rare", initialQty: 10, color: "#9c27b0" },
            { id: "p3", name: "🎁 手提資料袋", rarity: "Rare", initialQty: 15, color: "#2196f3" },
            { id: "p4", name: "🎁 保溫提袋", rarity: "Common", initialQty: 15, color: "#ff5252" }
        ];

        let currentInventory = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!currentInventory) {
            currentInventory = defaultPrizes.map(p => ({ ...p, qty: p.initialQty }));
            localStorage.setItem(STORAGE_KEY, JSON.stringify(currentInventory));
        }

        function startGame() {
            const availablePrizes = currentInventory.filter(p => p.qty > 0);
            
            if (availablePrizes.length === 0) {
                alert("所有的獎品都已經被抽完囉！");
                return;
            }

            const btn = document.getElementById('startBtn');
            const machine = document.getElementById('machine');
            const capsule = document.getElementById('capsule');
            const capsuleColor = document.getElementById('capsuleColor');

            btn.disabled = true;
            btn.innerText = "轉動中";
            
            machine.classList.add('shaking');

            setTimeout(() => {
                machine.classList.remove('shaking');
                btn.innerText = "開始抽獎"; 
                
                const randomIndex = Math.floor(Math.random() * availablePrizes.length);
                const wonPrize = availablePrizes[randomIndex];

                const prizeIndex = currentInventory.findIndex(p => p.id === wonPrize.id);
                currentInventory[prizeIndex].qty -= 1;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(currentInventory));

                capsuleColor.style.backgroundColor = wonPrize.color;
                capsule.classList.add('roll-out');

                setTimeout(() => {
                    capsule.classList.add('open');
                    
                    setTimeout(() => {
                        document.getElementById('rarityDisplay').innerText = wonPrize.rarity;
                        document.getElementById('prizeNameDisplay').innerText = wonPrize.name;
                        
                        document.getElementById('resultScreen').classList.add('active');
                    }, 500);

                }, 800); 

            }, 1000); 
        }

        function closeResult() {
            document.getElementById('resultScreen').classList.remove('active');
            
            setTimeout(() => {
                const capsule = document.getElementById('capsule');
                capsule.classList.remove('open');
                capsule.classList.remove('roll-out');
                document.getElementById('startBtn').disabled = false;
            }, 300);
        }

        function checkPassword() {
            let pwd = prompt("請輸入管理員密碼：");
            if (pwd === ADMIN_PASSWORD) {
                openAdmin();
            } else if (pwd !== null) {
                alert("密碼錯誤！");
            }
        }

        function openAdmin() {
            document.getElementById('adminOverlay').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'block';
            
            let html = "";
            currentInventory.forEach((p, index) => {
                html += `
                <div class="admin-item">
                    <span>${p.name}</span>
                    <div>剩 <input type="number" id="qty_${index}" value="${p.qty}" min="0"> 個</div>
                </div>`;
            });
            document.getElementById('adminList').innerHTML = html;
        }

        function closeAdmin() {
            document.getElementById('adminOverlay').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
        }

        function saveAdminChanges() {
            currentInventory.forEach((p, index) => {
                let newQty = parseInt(document.getElementById(`qty_${index}`).value);
                if(!isNaN(newQty)) {
                    p.qty = newQty;
                }
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(currentInventory));
            alert("庫存已更新成功！");
            closeAdmin();
        }

        function resetData() {
            let confirmReset = confirm("⚠️ 警告：這會清除目前的抽獎紀錄！\n\n如果你剛修改了程式碼中的「獎品名稱」或「數量」，請按「確定」來載入最新設定。");
            if (confirmReset) {
                localStorage.removeItem(STORAGE_KEY); 
                location.reload(); 
            }
        }
    </script>
</body>
</html>
